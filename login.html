<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkForge | Log In</title>
  <link rel="icon" href="images/logo.jpeg">
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; transition: background 0.3s, color 0.3s; }
    [data-theme="dark"] body { background-color: #000000; color: #ffffff; }
    [data-theme="dark"] .auth-card { background-color: #0a0a0a; border-color: #27272a; }
    [data-theme="dark"] input { background-color: #18181b; border-color: #27272a; color: #ffffff; }
    [data-theme="dark"] input::placeholder { color: #71717a; }
    [data-theme="dark"] .btn-social { background-color: #18181b; border-color: #27272a; }
    [data-theme="dark"] .btn-social:hover { background-color: #27272a; }
    [data-theme="dark"] .theme-btn { background-color: #18181b !important; border-color: #27272a !important; color: #ffffff !important; }
    [data-theme="dark"] .text-slate-900 { color: #ffffff !important; }
    [data-theme="dark"] .title { color: #ffffff !important; }
    [data-theme="dark"] .text-zinc-500 { color: #a1a1aa !important; }
    [data-theme="dark"] .text-stone-500 { color: #a8a29e !important; }
  </style>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative">

  <!-- Floating Controls -->
  <div class="w-full flex justify-end gap-3 mb-4">
    <button onclick="toggleTheme()" class="theme-btn bg-white border border-stone-200 p-3 rounded-xl shadow-sm hover:scale-105 transition"> <i class="themeIcon bi bi-moon-stars-fill"></i></button>
    <button onclick="toggleRTL()" class="theme-btn bg-white border border-stone-200 p-3 rounded-xl shadow-sm hover:scale-105 transition"> <i class="bi bi-arrow-left-right"></i></button>
  </div>

  <div class="auth-card bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-stone-100 w-full max-w-md">
    
    <!-- Brand Name / Logo -->
    <div class="text-center mb-8">
     <h1 class="text-2xl text-slate-900 font-bold tracking-tight">
    <a href="index.html" class="flex items-center justify-center gap-2">
      <svg width="32" height="32" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGradLog" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B4513" />
            <stop offset="100%" stop-color="#D2B48C" />
          </linearGradient>
          <linearGradient id="metalGradLog" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#475569" />
            <stop offset="100%" stop-color="#1e293b" />
          </linearGradient>
        </defs>
        <polygon points="50,90 15,70 15,30 50,10 85,30 85,70" fill="url(#metalGradLog)" />
        <polygon points="50,85 20,67 20,33 50,15 80,33 80,67" fill="#0f172a" />
        <path d="M 50,20 L 70,55 L 50,50 L 30,55 Z" fill="url(#logoGradLog)" />
        <path d="M 50,80 C 40,65 60,65 50,80 Z" fill="url(#logoGradLog)" />
        <line x1="50" y1="20" x2="50" y2="45" stroke="#fff" stroke-width="2" />
        <circle cx="50" cy="47" r="2.5" fill="#fff" />
      </svg>
      <span>Ink<span style="color: #8B4513">Forge</span></span>
    </a>
  </h1>
      <h2 class="text-2xl font-bold mt-2">Welcome Back</h2>
      <p class="text-stone-500 text-sm mt-2">Log in to continue your reading journey</p>
    </div>

    <!-- LOGIN FORM -->
    <form class="space-y-4">
      <input type="email" placeholder="Email Address" class="w-full p-4 rounded-xl border border-stone-200 outline-none focus:border-[#8B4513] transition">
      
      <div class="relative">
        <input type="password" id="pass" placeholder="Password" class="w-full p-4 pe-12 rounded-xl border border-stone-200 outline-none focus:border-[#8B4513] transition">
        <i class="bi bi-eye-slash absolute end-4 top-1/2 -translate-y-1/2 cursor-pointer text-stone-400 hover:text-[#8B4513] transition" onclick="togglePass('pass')"></i>
      </div>

      <div class="flex items-center justify-between text-sm">
        <div class="flex items-center gap-2">
          <input type="checkbox" id="remember" class="accent-[#8B4513]">
          <label for="remember" class="text-stone-500">Remember me</label>
        </div>
        <a href="#" class="text-[#8B4513] font-semibold hover:underline">Forgot Password?</a>
      </div>
      
      <button class="w-full bg-[#8B4513] text-white font-bold py-4 rounded-xl hover:bg-[#A0522D] transition shadow-md">Log In</button>
    </form>

    <!-- SOCIAL LOGIN -->
    <div class="my-4 flex items-center gap-4">
      <div class="flex-grow h-px bg-stone-200"></div>
      <span class="text-[10px] text-stone-400 font-bold uppercase tracking-widest">Or log in with</span>
      <div class="flex-grow h-px bg-stone-200"></div>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <button class="btn-social flex items-center justify-center gap-2 p-3 border border-stone-200 rounded-xl hover:bg-stone-50 transition font-semibold text-sm">
        <i class="bi bi-google text-red-500 text-lg lg:text-base"></i> <span class="hidden lg:inline">Google</span>
      </button>
      <button class="btn-social flex items-center justify-center gap-2 p-3 border border-stone-200 rounded-xl hover:bg-stone-50 transition font-semibold text-sm">
        <i class="bi bi-facebook text-blue-600 text-lg lg:text-base"></i> <span class="hidden lg:inline">Facebook</span>
      </button>
      <button class="btn-social flex items-center justify-center gap-2 p-3 border border-stone-200 rounded-xl hover:bg-stone-50 transition font-semibold text-sm">
        <i class="bi bi-apple text-lg lg:text-base"></i> <span class="hidden lg:inline">Apple</span>
      </button>
    </div>

    <!-- Sign Up Link -->
    <div class="text-center mt-4 text-sm">
      <p class="text-stone-500">New to InkForge? <a href="sign.html" class="text-[#8B4513] font-bold hover:underline">Create Account</a></p>
    </div>
  </div>

  <script>
    function togglePass(id) {
      const input = document.getElementById(id);
      const icon = input.nextElementSibling;
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye-slash", "bi-eye");
      } else {
        input.type = "password";
        icon.classList.replace("bi-eye", "bi-eye-slash");
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleRTL() {
      document.documentElement.dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
    }
  </script>
</body>
</html>
