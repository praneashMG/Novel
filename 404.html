<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | InkForge</title>
  <link rel="icon" href="images/logo.jpeg">
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #0B0B0B;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background particles */
    .bg-particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(139, 69, 19, 0.08);
      animation: float 8s ease-in-out infinite;
    }
    .bg-particle:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-delay: 0s; }
    .bg-particle:nth-child(2) { width: 300px; height: 300px; bottom: -80px; right: -60px; animation-delay: 2s; }
    .bg-particle:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 60%; animation-delay: 4s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
      50% { transform: translate(30px, -30px) scale(1.1); opacity: 1; }
    }

    /* Glitch effect on 404 */
    .glitch {
      position: relative;
      display: inline-block;
    }
    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }
    .glitch::before {
      color: #8B4513;
      animation: glitch-1 4s ease-in-out infinite;
    }
    .glitch::after {
      color: #D2B48C;
      animation: glitch-2 4s ease-in-out infinite;
    }

    @keyframes glitch-1 {
      0%, 100% { opacity: 0; transform: translate(0); }
      20% { opacity: 0.6; transform: translate(-3px, 3px); }
      21% { opacity: 0; }
    }
    @keyframes glitch-2 {
      0%, 100% { opacity: 0; transform: translate(0); }
      60% { opacity: 0.6; transform: translate(3px, -3px); }
      61% { opacity: 0; }
    }

    /* Ink drip animation */
    .ink-drip {
      position: absolute;
      width: 3px;
      background: linear-gradient(to bottom, #8B4513, transparent);
      border-radius: 0 0 50% 50%;
      animation: drip 3s ease-in infinite;
    }
    .ink-drip:nth-child(1) { left: 20%; height: 60px; animation-delay: 0.5s; }
    .ink-drip:nth-child(2) { left: 45%; height: 80px; animation-delay: 1.2s; }
    .ink-drip:nth-child(3) { left: 70%; height: 50px; animation-delay: 2s; }
    .ink-drip:nth-child(4) { left: 85%; height: 70px; animation-delay: 0.8s; }

    @keyframes drip {
      0% { top: -80px; opacity: 0.8; }
      70% { opacity: 0.4; }
      100% { top: 110vh; opacity: 0; }
    }

    /* Button hover glow */
    .btn-glow {
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }
    .btn-glow::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }
    .btn-glow:hover::before {
      width: 300px;
      height: 300px;
    }
    .btn-glow:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(139, 69, 19, 0.3);
    }

    /* Floating book icon animation */
    .float-icon {
      animation: iconFloat 3s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(3deg); }
    }

    /* Line separator animation */
    .line-grow {
      width: 0;
      animation: lineExpand 1.5s ease forwards 0.5s;
    }
    @keyframes lineExpand {
      to { width: 80px; }
    }
  </style>
</head>
<body>
  <!-- Background particles -->
  <div class="bg-particle"></div>
  <div class="bg-particle"></div>
  <div class="bg-particle"></div>

  <!-- Ink drips -->
  <div class="ink-drip"></div>
  <div class="ink-drip"></div>
  <div class="ink-drip"></div>
  <div class="ink-drip"></div>

  <!-- Main Content -->
  <div class="relative z-10 text-center px-6 max-w-2xl mx-auto">

    <!-- 404 Number -->
    <h1 class="text-[10rem] md:text-[14rem] font-black leading-none tracking-tighter glitch" style="color: #ffffff; text-shadow: 0 0 80px rgba(139,69,19,0.15);">
      404
    </h1>

    <!-- Animated line -->
    <div class="line-grow h-1 bg-gradient-to-r from-transparent via-[#8B4513] to-transparent mx-auto mb-8 rounded-full"></div>

    <!-- Message -->
    <h2 class="text-2xl md:text-3xl font-bold text-white mb-4">
      This Chapter <span class="text-[#8B4513]">Doesn't Exist</span>
    </h2>
    <p class="text-zinc-400 text-lg leading-relaxed max-w-md mx-auto mb-10">
      Looks like this page has gone missing from our library. It may have been moved, deleted, or never written.
    </p>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a href="index.html" class="btn-glow px-8 py-4 bg-[#8B4513] text-white rounded-xl font-semibold flex items-center gap-2 text-sm">
        <i class="bi bi-house-fill"></i> Back To Home
      </a>
      <a href="contact.html" class="px-8 py-4 border-2 border-[#8B4513]/40 text-[#D2B48C] rounded-xl font-semibold hover:border-[#8B4513] hover:bg-[#8B4513]/10 transition-all duration-300 flex items-center gap-2 text-sm">
        <i class="bi bi-chat-dots-fill"></i> Contact Support
      </a>
    </div>

    <!-- Quick links -->
    <div class="mt-14 flex flex-wrap items-center justify-center gap-6 text-sm text-zinc-500">
      <a href="comics.html" class="hover:text-[#D2B48C] transition flex items-center gap-1.5"><i class="bi bi-book-half"></i> Comics</a>
      <span class="w-1 h-1 bg-zinc-600 rounded-full"></span>
      <a href="shop.html" class="hover:text-[#D2B48C] transition flex items-center gap-1.5"><i class="bi bi-cart3"></i> Shop</a>
      <span class="w-1 h-1 bg-zinc-600 rounded-full"></span>
      <a href="services.html" class="hover:text-[#D2B48C] transition flex items-center gap-1.5"><i class="bi bi-gear"></i> Services</a>
      <span class="w-1 h-1 bg-zinc-600 rounded-full"></span>
      <a href="about.html" class="hover:text-[#D2B48C] transition flex items-center gap-1.5"><i class="bi bi-info-circle"></i> About</a>
    </div>
  </div>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Poppins', 'ui-sans-serif', 'system-ui'],
          },
        },
      },
    }
  </script>
</body>
</html>
